name: CI/CD 

on : 
   push:
      branches:
         -main
jobs:
   build-and-deploy:
      runs-on: ubuntu-latest

      steps:
        - name: check out code
          uses: actions/checkout@v3

        - name: setup docker buildx
          uses: docker/setup-buildx-actions@v3

        - name: docker login
          uses: docker/login-action@v3
          with: 
            username: ${{ secrets.docker_username }}
            password: ${{ secrets.docker_username }}

        - name : build and push dockerfile
          uses: docker/build-push-action@v5
          with:
            push: true
            tags: asomaaroufiniyaa/node-service:latest


        - name : ssh to aws and run container
          uses : appleboy/ssh-action@v0.1.7
          with:
            host: ${{ secrets.AWS_HOST }}
            username: ubuntu
            key: ${{ secrets.AWS_key }}

            scripts: |
              docker pull asomaaroufiniyaa/node-service:latest
              docker stop node-service || true
              docker rm node-service || true
              docker run -d -p 3000:3000 --name node-service asomaaroufiniyaa/node-service:latest
